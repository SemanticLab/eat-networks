<head>
  <style> body { margin: 0; } </style>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <script src="//unpkg.com/force-graph"></script>
  <script src="../people_network.js"></script>

  <style>
    body{
      font-family: verdana;
      color: #212427;
    }
    h1{
      position: absolute;
      left: 10px;
      top: 0;
      padding: 0;
      margin: 0;

    position: absolute;


    text-transform: uppercase;
    font-family: verdana;
    font-size: 5em;
    font-weight: 700;
    color: #f5f5f5;
    text-shadow: 1px 1px 1px #919191,
        1px 2px 1px #919191,
        1px 3px 1px #919191,
        1px 4px 1px #919191,
        1px 5px 1px #919191,
        1px 6px 1px #919191,
        1px 7px 1px #919191,
        1px 8px 1px #919191,
        1px 9px 1px #919191,
        1px 10px 1px #919191,

    1px 22px 10px rgba(16,16,16,0.2),

    1px 30px 60px rgba(16,16,16,0.4);
    transition-property: opacity;
    transition-duration: 2.5s;


    }

    #app{
      position: absolute;
      left: 0;
      top: 0;

    }

    #modal{

/*background: rgb(221,221,221);
background: linear-gradient(180deg, rgba(255,255,255,1) 27%, rgba(50,50,50,1) 100%);
*/
      width:90vw;
      height: 90vh;
      left:5vw;
      top:5vh;
      position: absolute;
      box-shadow: -1px 14px 15px -3px rgba(0,0,0,0.46);
      overflow: hidden;
       border: solid 1px #212427;
    }


    .loading-gradient {
      background: linear-gradient(-45deg, rgba(255,255,255,1), rgba(50,50,50,1), rgba(255,255,255,1), rgba(50,50,50,1));
      background-size: 400% 400%;
      animation: gradient 10s ease infinite;

    }
    .loaded-gradient{
      background: linear-gradient(-45deg, rgba(255,255,255,1), rgba(50,50,50,1), rgba(255,255,255,1), rgba(50,50,50,1));
      background-size: 400% 400%;
      background-position: 16% 57%;
    
    }

    @keyframes gradient {
      0% {
        background-position: 0% 50%;

      }

    .wikibase-link{

    .wikibase-link-label{

      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #about-content{
      border-top:solid 1px #212427;

      border: none;
    }

    .about-back:hover svg{
      cursor: pointer;
      transform: translateY(5px);
      transform: scale(0.9);

    #about-content-names{
      display: grid;
      grid-template-columns: repeat(10,1fr);
    justify-items: center;
      grid-gap: 5px;
      cursor: pointer;
      padding-block: 2em;

    .about-content-name{
      width: 100px;


    }

    #menu-toggle{
      position: absolute;
      top: 12px;

    }

      position: absolute;

    }
    .layout-btn.active{

      border-bottom: solid 1px #eee;

      font-size: 0.9em;

    #menu-panel-filter input:focus{

    .menu-item{

    }

<body>

  </button>

  <div id="menu-panel">
    <div id="menu-panel-header">People</div>
    <div id="menu-panel-layouts">
      <button class="layout-btn active" data-layout="force">Force</button>
      <button class="layout-btn" data-layout="hub">Hub &amp; spoke</button>
      <button class="layout-btn" data-layout="radial">Radial</button>
      <button class="layout-btn" data-layout="cluster">Cluster</button>
    </div>
    <div id="menu-panel-filter">
      <input id="menu-panel-filter-input" type="text" placeholder="Filter by name (use | for OR)..." />
      <button id="menu-panel-clear" type="button">Clear</button>
    </div>
    <div id="menu-panel-hint">Check people or type to highlight. Their 2-hop connections stay visible; everyone else is dimmed.</div>
    <div id="menu-panel-list"></div>
  </div>

  <div id="app">

        </div>

          </a>

</svg></a></code>

        </div>

  <script>

    let imgs = {}
    let imgUrls = {}
    let names = {}

    for (let img of allData.nodes){
      imgUrls[img.id] = img.img
      names[img.id] = img.name
      if (img.img){        
        const imgEl = new Image();
        imgEl.src = img.img;
        imgs[img.id] = imgEl
      }

    }


    const { createApp } = Vue

    let vueApp = createApp({
      data() {
        return {
          display:false,
          pic:null,
          name:null,
          wikibaseUrl:null,
          mainCount:'...',
          modalInstructions: '',
          blocksByAssoicated: [],
          blocksByAssoicatedOld:[],
          textBlocks:[],
          textBlockMeta:null,
        }
      },

      methods:{

        nodeClick: async function(node){

          if (imgUrls[node.id]){
            this.pic =  imgUrls[node.id]
          }else{
            this.pic = '../img/person.png'
          }

          
          

          this.name = names[node.id]
          this.wikibaseUrl = `http://base.semlab.io/wiki/Item:Q${node.id}`

          this.display=true



          this.$nextTick(() => {
          

            this.$refs.modal.classList.add('loading-gradient')
          
            let height = document.getElementById('modal').offsetHeight - document.getElementById('about').offsetHeight
            document.getElementById('about-content').style.height = `${height+15}px`
          });

          this.modalInstructions="loading..."
          this.blocksByAssoicated=[]
          this.textBlocks=[]
          this.textBlockMeta = null

          this.mainCount='...'
          this.blocksByAssoicated = await this.downloadBlockText(`${node.id}`)


            this.$refs.modal.classList.add('loaded-gradient')


          this.$refs.modal.classList.remove('loading-gradient')




          let t = 0
          for (let b of this.blocksByAssoicated){
            t=t+b.blocks.length
          }
          this.mainCount = t + ' text blocks'


          if (this.blocksByAssoicated.length === 0){
            this.modalInstructions = `No archival text blocks are currently available for ${this.name}. They may appear in the network because of older relationship data whose source documents have since been removed from the wikibase.`
          } else {
            this.modalInstructions = `Below are the people who were mentioned with ${this.name} in archival documents. Click to show the text blocks they share.`
          }


          console.log(this.blocksByAssoicated)
          console.log(imgUrls[node.id])
          console.log(names[node.id])

        },

        back: function(){

          this.textBlockMeta = null
          this.blocksByAssoicated = this.blocksByAssoicatedOld
          this.blocksByAssoicatedOld = []
          this.textBlocks = []

        },

        showTextBlocks: function(b){
          this.blocksByAssoicatedOld = this.blocksByAssoicated
          this.blocksByAssoicated=[]
          this.textBlocks=b.blocks;
          this.textBlockMeta = b



        },

        normie: function(word){
          console.log("TESTING",word)
          if (word.length == 0){ return word}

          word = word.split("'")[0]
          word = word.split("’")[0]
          
          
          word = word.replace(/'s/g,'')
          
          word = word.replace(/’s/g,'')          
          word = word.replace(/\Ws/g,'')          
          
          
          word = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()”“’]/g,"")
          
          return word.toLowerCase()
        },

        highlight: function(lookfor, lookin){

          let textArrayResults = []

          for (let t of lookin.split(' ')){
            let foundIt = false

            for (let w of lookfor.split(' ')){
              if (this.normie(t) == this.normie(w)){
                textArrayResults.push(`<span>${t}</span>`)
                foundIt = true
              }else if (t.includes('<br>')) {
                let spliT = t.replace(/<br>/g,' ').split(' ')
                
                for (let tt of spliT){
                  
                  if (this.normie(tt) == this.normie(w)){
                    
                    textArrayResults.push(`<span>${t}</span>`)
                    foundIt = true

                  }
                }




              }
            }

            if (foundIt ==false){
              textArrayResults.push(t)
            }

          }

          return textArrayResults.join(' ')

        },

        loadText: async function(event,b){


          let text = await fetch(b.textUrl, {headers: { 'charset' : 'utf-8'}})
          text = await text.text()

          text=text.replace(/\n/g,'<br><br>')

          text = this.highlight(this.textBlockMeta.label,text)
          text = this.highlight(this.name,text)

          event.target.parentNode.innerHTML = text

        },

        downloadBlockText: async function(qid){
          let sparql = `
              select * { 
                {select * where { 
                  ?block wdt:P21 wd:Q${qid}.
                }}
                              
                  ?block wdt:P19 ?text .
                  ?block wdt:P24 ?parentDoc .
                  ?parentDoc rdfs:label ?parentDocLabel. 
                  ?block wdt:P20 ?textUrl .
                  ?block wdt:P21 ?entity .
                  ?entity rdfs:label ?entityLabel. 
                  ?entity wdt:P1 wd:Q1.
                
              }
          `

          let blockTextData = await fetch('https://query.semlab.io/proxy/wdqs/bigdata/namespace/wdq/sparql?' + new URLSearchParams({
              query: sparql
          }), {headers: { 'Accept' : 'application/json'}})

          blockTextData = await blockTextData.json()


          let blocksByAssoicated = {}

          for (let b of blockTextData.results.bindings){

            if (parseInt(b.entity.value.split('/')[b.entity.value.split('/').length-1].replace('Q','')) != qid){


              if (!blocksByAssoicated[b.entity.value]){ blocksByAssoicated[b.entity.value] = {
                blocks: [],
                label: b.entityLabel.value,
                id: parseInt(b.entity.value.split('/')[b.entity.value.split('/').length-1].replace('Q','')),
                img: imgUrls[parseInt(b.entity.value.split('/')[b.entity.value.split('/').length-1].replace('Q',''))]

              } }

              let canExpand = false
              if (b.text.value.endsWith('...')){
                canExpand=true
              }



              blocksByAssoicated[b.entity.value].blocks.push({
                block: b.block.value,
                doc: b.parentDoc.value,
                docLabel: b.parentDocLabel.value,
                text: b.text.value,
                uri:b.entity.value,
                textUrl: b.textUrl.value,
                isMore: canExpand



              })

            }

          }
            
          let blocksByAssoicatedArray = []
          for (let key in blocksByAssoicated){
            blocksByAssoicatedArray.push(blocksByAssoicated[key])
          }


          blocksByAssoicatedArray.sort(function(a,b) {
              var x = a.label.toLowerCase();
              var y = b.label.toLowerCase();
              return x < y ? -1 : x > y ? 1 : 0;
          });



          return blocksByAssoicatedArray

        }





      }


    }).mount('#app')



























    console.log(allData)

    // downloadBlockText()



    let zoomCount = 0
    const personImg = new Image();
    personImg.src = '../img/person.png';



    const gData = {
      nodes: allData.nodes,
      links: allData.links
    };

    // ---- Filter state (mutated by menu; read by render callbacks) ----
    // primaryIds = explicitly-highlighted people (red ring + label)
    // hop1Ids = direct neighbors of primary (full opacity)
    // hop2Ids = neighbors of hop1 not already primary/hop1 (50% opacity)
    // visibleIds = union of the above; everyone else is hidden
    // When primaryIds is empty, no filter is active and everything renders normally.
    const primaryIds = new Set();
    const hop1Ids = new Set();
    const hop2Ids = new Set();
    const visibleIds = new Set();

    const linkSourceId = (l) => (typeof l.source === 'object' ? l.source.id : l.source);
    const linkTargetId = (l) => (typeof l.target === 'object' ? l.target.id : l.target);

    const Graph = ForceGraph()
      (document.getElementById('graph'))
      .nodeCanvasObject((node, ctx, globalScale) => {




        const size = 12;

        const filterActive = primaryIds.size > 0;
        const isPrimary = filterActive && primaryIds.has(node.id);
        const isVisible = !filterActive || visibleIds.has(node.id);

        if (filterActive && !isVisible){
          return; // hide entirely
        }
        ctx.save();
        if (filterActive && hop2Ids.has(node.id)) ctx.globalAlpha = 0.5;

        if (node.img){

          ctx.save();
          ctx.beginPath();
          ctx.arc(node.x, node.y, size/2, 0, 2 * Math.PI);
          ctx.clip();

          ctx.drawImage(imgs[node.id], node.x - size / 2, node.y - size / 2, size, size);
          ctx.restore();
        }else{



          ctx.beginPath();
          ctx.arc(node.x, node.y, size/2.5, 0, 2 * Math.PI);
          ctx.fillStyle = "white";
          ctx.fill();



          ctx.drawImage(personImg, node.x - size / 2, node.y - size / 2, size, size);


          // ctx.fillStyle = 'blue';
          // ctx.fillRect(node.x - size / 2, node.y - size / 2, size, size);
        }

        if (isPrimary){
          ctx.beginPath();
          ctx.arc(node.x, node.y, size/2 + 1.5, 0, 2 * Math.PI);
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = '#ff2d2d';
          ctx.stroke();
        }

        if (globalScale>3 || isPrimary){

          const label = node.name;
          const fontSize = (isPrimary && globalScale<=3) ? 3 : 12/globalScale;
          ctx.font = `${fontSize}px Sans-Serif`;
          const textWidth = ctx.measureText(label).width;
          const bckgDimensions = [textWidth, fontSize].map(n => n + fontSize * 0.2); // some padding

          ctx.fillStyle = isPrimary ? 'rgba(255, 45, 45, 0.9)' : 'rgba(0, 0, 0, 0.8)';
          ctx.fillRect(node.x - bckgDimensions[0] / 2, node.y - bckgDimensions[1] / 2 + size/2, ...bckgDimensions);

          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = 'white';
          ctx.fillText(label, node.x, node.y +  size/2);
        }

        ctx.restore();

      })
      .nodePointerAreaPaint((node, color, ctx) => {
        if (primaryIds.size > 0 && !visibleIds.has(node.id)) return;
        const size = 12;
        ctx.fillStyle =  color;
        ctx.fillRect(node.x - size / 2, node.y - size / 2, size, size); // draw square as pointer trap
      })
      // .linkColor(() => 'whitesmoke')
      .linkVisibility((link) => {
        if (primaryIds.size === 0) return true;
        return visibleIds.has(linkSourceId(link)) && visibleIds.has(linkTargetId(link));
      })
      .linkColor((link) => {
        if (primaryIds.size === 0) return 'rgba(0,0,0,0.2)';
        const sP = primaryIds.has(linkSourceId(link));
        const tP = primaryIds.has(linkTargetId(link));
        if (sP || tP) return 'rgba(255,45,45,0.9)';
        return 'rgba(0,0,0,0.15)';
      })
      .linkWidth((link) => {
        if (primaryIds.size === 0) return 0.25;
        const sP = primaryIds.has(linkSourceId(link));
        const tP = primaryIds.has(linkTargetId(link));
        return (sP || tP) ? 1.5 : 0.25;
      })
      // .linkCurvature(() => 1)
      .onNodeClick((node,event)=> {

        vueApp.nodeClick(node)

      })
      .onZoom(()=>{
        zoomCount++
        if (zoomCount>2){
          document.getElementById('title').style.opacity=0;
        }
      })

      // .d3AlphaDecay(0.05)
      .graphData(gData);

      Graph.d3Force('link').distance(link => 100)


    // ---- Adjacency index for 2-hop expansion ----
    const adjacency = new Map();
    for (const n of allData.nodes) adjacency.set(n.id, new Set());
    for (const l of allData.links){
      const s = linkSourceId(l);
      const t = linkTargetId(l);
      if (adjacency.has(s)) adjacency.get(s).add(t);
      if (adjacency.has(t)) adjacency.get(t).add(s);
    }

    // ---- Hamburger menu ----
    const filterInput = document.getElementById('menu-panel-filter-input');
    const parseFilterTerms = () => filterInput.value
      .toLowerCase()
      .split('|')
      .map(t => t.trim())
      .filter(t => t.length > 0);
    const matchesFilter = (label, terms) => {
      const lower = label.toLowerCase();
      return terms.some(t => lower.includes(t));
    };

    const checkedIds = new Set();

    const recompute = () => {
      primaryIds.clear();
      hop1Ids.clear();
      hop2Ids.clear();
      visibleIds.clear();

      const terms = parseFilterTerms();
      // primary = text matches OR explicitly checked
      for (const n of allData.nodes){
        if (checkedIds.has(n.id)) { primaryIds.add(n.id); continue; }
        if (terms.length > 0 && matchesFilter(n.name || '', terms)) primaryIds.add(n.id);
      }

      if (primaryIds.size > 0){
        for (const id of primaryIds){
          visibleIds.add(id);
          const neigh = adjacency.get(id);
          if (!neigh) continue;
          for (const n of neigh){
            if (primaryIds.has(n)) continue;
            hop1Ids.add(n);
            visibleIds.add(n);
          }
        }
        for (const id of hop1Ids){
          const neigh = adjacency.get(id);
          if (!neigh) continue;
          for (const n of neigh){
            if (primaryIds.has(n) || hop1Ids.has(n)) continue;
            hop2Ids.add(n);
            visibleIds.add(n);
          }
        }
      }

      // Force force-graph to invalidate its visibility cache and repaint.
      Graph.linkVisibility(Graph.linkVisibility());
      Graph.nodeRelSize(Graph.nodeRelSize()); // any prop reassignment triggers redraw
    };

    const peopleNodes = allData.nodes
      .slice()
      .sort((a, b) => (a.name || '').localeCompare(b.name || ''));

    const menuList = document.getElementById('menu-panel-list');
    const menuItemEls = new Map();
    for (const p of peopleNodes){
      const item = document.createElement('div');
      item.className = 'menu-item';
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = false;
      checkbox.id = `person-toggle-${p.id}`;
      const label = document.createElement('label');
      label.htmlFor = checkbox.id;
      label.textContent = p.name || `Q${p.id}`;
      checkbox.addEventListener('change', () => {
        if (checkbox.checked) checkedIds.add(p.id);
        else checkedIds.delete(p.id);
        recompute();
      });
      item.appendChild(checkbox);
      item.appendChild(label);
      menuList.appendChild(item);
      menuItemEls.set(p.id, item);
    }

    document.getElementById('menu-toggle').addEventListener('click', () => {
      document.getElementById('menu-panel').classList.toggle('open');
    });

    filterInput.addEventListener('input', () => {
      const terms = parseFilterTerms();
      for (const p of peopleNodes){
        const visible = terms.length === 0 || matchesFilter(p.name || '', terms);
        menuItemEls.get(p.id).classList.toggle('hidden', !visible);
      }
      recompute();
    });

    document.getElementById('menu-panel-clear').addEventListener('click', () => {
      filterInput.value = '';
      checkedIds.clear();
      for (const p of peopleNodes){
        const cb = document.getElementById(`person-toggle-${p.id}`);
        if (cb) cb.checked = false;
        menuItemEls.get(p.id).classList.remove('hidden');
      }
      recompute();
    });


    // ---- Layouts ----
    // Each layout sets fx/fy on some/all nodes (pinning them) and lets the rest float.
    // 'force' clears all pins.
    const degree = new Map();
    for (const n of allData.nodes) degree.set(n.id, adjacency.get(n.id).size);

    const unpinAll = () => {
      for (const n of allData.nodes){
        n.fx = undefined;
        n.fy = undefined;
      }
    };

    const layouts = {
      force: () => {
        unpinAll();
      },

      hub: () => {
        // Top-N highest-degree nodes pinned in a big oval; rest float between/around.
        unpinAll();
        const N = 8;
        const top = allData.nodes
          .slice()
          .sort((a, b) => degree.get(b.id) - degree.get(a.id))
          .slice(0, N);
        const rx = 900, ry = 600;
        top.forEach((n, i) => {
          const t = (i / top.length) * Math.PI * 2 - Math.PI / 2;
          n.fx = Math.cos(t) * rx;
          n.fy = Math.sin(t) * ry;
        });
      },

      radial: () => {
        // Concentric rings by degree (most-connected at center).
        // Ring capacity scales with circumference so spacing per node stays
        // roughly constant; outer rings hold more nodes than inner ones.
        unpinAll();
        const sorted = allData.nodes.slice().sort((a, b) => degree.get(b.id) - degree.get(a.id));
        const minSpacing = 35;          // min pixels between adjacent nodes on a ring
        const ringGap = 60;              // distance between successive rings
        const startRadius = 80;
        let placed = 0;
        let ring = 0;
        while (placed < sorted.length){
          const r = startRadius + ring * ringGap;
          const circumference = 2 * Math.PI * r;
          const capacity = Math.max(1, Math.floor(circumference / minSpacing));
          const count = Math.min(capacity, sorted.length - placed);
          // Stagger ring rotation so labels don't all line up radially
          const rotOffset = ring * 0.37;
          for (let i = 0; i < count; i++){
            const n = sorted[placed + i];
            const t = (i / count) * Math.PI * 2 + rotOffset;
            n.fx = Math.cos(t) * r;
            n.fy = Math.sin(t) * r;
          }
          placed += count;
          ring++;
        }
      },

      cluster: () => {
        // Community detection via degree-weighted label propagation. Each
        // neighbor's vote is weighted by 1/sqrt(degree) so high-degree hubs
        // don't dominate, which breaks the single giant component into
        // tighter subgroups.
        unpinAll();

        const labels = new Map();
        for (const n of allData.nodes) labels.set(n.id, n.id);
        const order = allData.nodes.map(n => n.id);
        const ROUNDS = 50;
        for (let r = 0; r < ROUNDS; r++){
          for (let i = order.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [order[i], order[j]] = [order[j], order[i]];
          }
          let changed = false;
          for (const id of order){
            const neigh = adjacency.get(id);
            if (!neigh || neigh.size === 0) continue;
            const counts = new Map();
            for (const nx of neigh){
              const l = labels.get(nx);
              const w = 1 / Math.sqrt(Math.max(degree.get(nx), 1));
              counts.set(l, (counts.get(l) || 0) + w);
            }
            let best = null, bestCount = -Infinity;
            for (const [l, c] of counts){
              if (c > bestCount || (c === bestCount && best !== null && l < best)){
                best = l; bestCount = c;
              }
            }
            if (best !== null && best !== labels.get(id)){
              labels.set(id, best);
              changed = true;
            }
          }
          if (!changed) break;
        }

        // Group nodes by final label
        const groups = new Map();
        for (const [id, l] of labels){
          if (!groups.has(l)) groups.set(l, []);
          groups.get(l).push(id);
        }
        const compList = Array.from(groups.entries())
          .filter(([_, ids]) => ids.length >= 2) // ignore singletons in grid
          .sort((a, b) => b[1].length - a[1].length);
        const singletons = Array.from(groups.values()).flat().filter(id => groups.get(labels.get(id)).length < 2);

        // Grid for community centers, with spacing scaled to community size
        const cols = Math.ceil(Math.sqrt(compList.length));
        const spacing = 550;
        const idToNode = new Map(allData.nodes.map(n => [n.id, n]));
        compList.forEach(([_, ids], i) => {
          const cx = (i % cols) * spacing - ((cols - 1) * spacing) / 2;
          const cy = Math.floor(i / cols) * spacing - (Math.floor((compList.length - 1) / cols) * spacing) / 2;
          const r = 30 + Math.sqrt(ids.length) * 18;
          ids.forEach((id, j) => {
            const node = idToNode.get(id);
            if (!node) return;
            const t = (j / ids.length) * Math.PI * 2;
            node.fx = cx + Math.cos(t) * r;
            node.fy = cy + Math.sin(t) * r;
          });
        });
        // Park singletons in a row above the grid
        singletons.forEach((id, j) => {
          const node = idToNode.get(id);
          if (!node) return;
          node.fx = (j - singletons.length / 2) * 25;
          node.fy = -(Math.floor((compList.length - 1) / cols) * spacing) / 2 - 250;
        });
      },
    };

    let activeLayout = 'force';

    // Fit the camera to the "central mass" of the graph: drop nodes whose
    // distance from the median is past the 90th percentile, then frame the
    // bounding box of what remains. Outliers are ignored so the dense middle
    // fills the viewport instead of being shrunk to fit stragglers.
    const recenterOnCentralMass = () => {
      const nodes = allData.nodes.filter(n => Number.isFinite(n.x) && Number.isFinite(n.y));
      if (nodes.length === 0) return;
      const xs = nodes.map(n => n.x).sort((a, b) => a - b);
      const ys = nodes.map(n => n.y).sort((a, b) => a - b);
      const median = (arr) => arr[Math.floor(arr.length / 2)];
      const cx = median(xs);
      const cy = median(ys);
      const dists = nodes.map(n => Math.hypot(n.x - cx, n.y - cy)).sort((a, b) => a - b);
      const cutoff = dists[Math.floor(dists.length * 0.9)];
      const kept = nodes.filter(n => Math.hypot(n.x - cx, n.y - cy) <= cutoff);
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const n of kept){
        if (n.x < minX) minX = n.x;
        if (n.x > maxX) maxX = n.x;
        if (n.y < minY) minY = n.y;
        if (n.y > maxY) maxY = n.y;
      }
      const w = maxX - minX, h = maxY - minY;
      const vw = Graph.width(), vh = Graph.height();
      const padding = 60;
      const k = Math.min((vw - padding * 2) / Math.max(w, 1), (vh - padding * 2) / Math.max(h, 1));
      Graph.centerAt((minX + maxX) / 2, (minY + maxY) / 2, 500);
      Graph.zoom(k, 500);
    };

    const applyLayout = (name) => {
      if (!layouts[name]) return;
      activeLayout = name;
      layouts[name]();
      for (const btn of document.querySelectorAll('.layout-btn')){
        btn.classList.toggle('active', btn.dataset.layout === name);
      }
      Graph.d3ReheatSimulation();
      setTimeout(recenterOnCentralMass, 400);
    };

    for (const btn of document.querySelectorAll('.layout-btn')){
      btn.addEventListener('click', () => applyLayout(btn.dataset.layout));
    }

  </script>
